<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Settings</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'home' %}">
                <i class="bi bi-traffic-light me-2"></i>TSCS Dashboard
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'monitoring' %}">Monitoring</a></li>
                    <li class="nav-item"><a class="nav-link active" href="{% url 'settings' %}">Settings</a></li>
                </ul>
                <a href="{% url 'logout' %}" class="btn btn-outline-light">Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <section class="mb-5">
            <div class="dashboard-card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-gear me-2"></i>System Settings</h5>
                    <div class="btn-group">
                        <button class="btn btn-outline-primary btn-sm" id="saveSettings">
                            <i class="bi bi-save me-1"></i>Save
                        </button>
                        <button class="btn btn-outline-secondary btn-sm" id="resetSettings">
                            <i class="bi bi-arrow-counterclockwise me-1"></i>Reset
                        </button>
                    </div>
                </div>

                <div class="card-body">
                    <div class="row g-4">
                        <div class="col-lg-6">
                            <div class="settings-card">
                                <h6><i class="bi bi-traffic-light me-2"></i>Traffic Management</h6>
                                <div class="mb-3">
                                    <label class="form-label">Congestion Threshold</label>
                                    <input type="range" class="form-range" min="50" max="200" value="100">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Signal Timing Mode</label>
                                    <select class="form-select">
                                        <option>Dynamic</option>
                                        <option>Fixed</option>
                                        <option>Peak Hours</option>
                                        <option>Off-Peak</option>
                                    </select>
                                </div>
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="checkbox" id="enableOptimization" checked>
                                    <label class="form-check-label" for="enableOptimization">Enable Real-time Optimization</label>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-6">
                            <div class="settings-card">
                                <h6><i class="bi bi-camera-video me-2"></i>Camera Settings</h6>
                                <div class="mb-3">
                                    <label class="form-label">Camera Quality</label>
                                    <select class="form-select">
                                        <option>High (1080p)</option>
                                        <option>Medium (720p)</option>
                                        <option>Low (480p)</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Recording Duration</label>
                                    <select class="form-select">
                                        <option>24 Hours</option>
                                        <option>48 Hours</option>
                                        <option>7 Days</option>
                                    </select>
                                </div>
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="checkbox" id="enableMotion" checked>
                                    <label class="form-check-label" for="enableMotion">Motion Detection</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="enableNight" checked>
                                    <label class="form-check-label" for="enableNight">Night Vision</label>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-6">
                            <div class="settings-card">
                                <h6><i class="bi bi-bell me-2"></i>Alert Settings</h6>
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="checkbox" id="alertTraffic" checked>
                                    <label class="form-check-label" for="alertTraffic">Traffic Congestion</label>
                                </div>
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="checkbox" id="alertEmergency" checked>
                                    <label class="form-check-label" for="alertEmergency">Emergency Vehicles</label>
                                </div>
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="checkbox" id="alertWeather" checked>
                                    <label class="form-check-label" for="alertWeather">Weather Conditions</label>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Alert Sound</label>
                                    <select class="form-select">
                                        <option>Default</option>
                                        <option>Beep</option>
                                        <option>Chime</option>
                                        <option>None</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-6">
                            <div class="settings-card">
                                <h6><i class="bi bi-display me-2"></i>System Preferences</h6>
                                <div class="mb-3">
                                    <label class="form-label">Theme</label>
                                    <select class="form-select">
                                        <option>Light</option>
                                        <option>Dark</option>
                                        <option>Auto</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Refresh Rate</label>
                                    <select class="form-select">
                                        <option>5 seconds</option>
                                        <option>10 seconds</option>
                                        <option>30 seconds</option>
                                        <option>1 minute</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/settings-handler.js' %}"></script>
</body>
</html>
