<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      body {
        background: linear-gradient(to right, #cc8cea, #7bfef5);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Roboto', sans-serif;
      }
      .forgot-container {
        background: #fff;
        border-radius: 10px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        animation: fadeIn 1.5s ease-in-out;
      }
      .forgot-container h2, .forgot-container h1 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
        font-weight: 700;
      }
      .form-control {
        border-radius: 50px;
        padding: 15px;
        margin-bottom: 20px;
        font-size: 16px;
        transition: all 0.3s ease;
      }
      .form-control:focus {
        border-color: #cc8cea;
        box-shadow: 0 0 5px #cc8cea;
      }
      .btn-primary {
        width: 100%;
        padding: 15px;
        border-radius: 50px;
        background-color: #cc8cea;
        border: none;
        font-size: 16px;
        transition: background-color 0.3s ease;
      }
      .btn-primary:hover {
        background-color: #25e0d3;
      }
      .footer-text {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
      }
      .footer-text a {
        color: #cc8cea;
        text-decoration: none;
      }
      .footer-text a:hover {
        text-decoration: underline;
      }
      @keyframes fadeIn {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="forgotForm" class="forgot-container">
      <h2>Forgot Password</h2>
      {% if messages %}
        {% for message in messages %}
          {% if message.tags == 'error' %}
            <center>
              <p style="color: firebrick;">{{ message }}</p>
            </center>
          {% else %}
            <center>
              <p style="color: dodgerblue;">{{ message }}</p>
            </center>
          {% endif %}
        {% endfor %}
      {% endif %}
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <input type="email" class="form-control" name="email" id="email" placeholder="Enter your Registered email" required />
        </div>
        <button type="submit" class="btn btn-primary">Send Confirmation Code</button>
      </form>
      <div class="footer-text">
        Remember your Password? <a href="{% url "login" %}">Log in</a>
      </div>
    </div>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
  </body>
</html>
